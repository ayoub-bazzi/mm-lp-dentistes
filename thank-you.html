<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Rank #1 Dental Marketing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .thank-you-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4ade80, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
            color: white;
        }

        .thank-you-box h1 {
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .thank-you-box p {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 1.1rem;
        }

        .thank-you-actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
    </style>
</head>

<body>
    <nav class="navbar-wrapper">
        <div class="navbar">
            <div class="logo">
                <img src="icon.png" width="168" height="161" alt="Marrakesh Marketing Logo" decoding="async">
            </div>
            <a href="index.html" class="nav-cta">Back to Home</a>
        </div>
    </nav>

    <main class="thank-you-section">
        <div class="thank-you-box">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1>Request Received!</h1>
            <p>Thank you for choosing us. Our team has received your information and will contact you shortly to confirm your setup.</p>
            
            <div class="thank-you-actions">
                <a href="https://wa.me/212753787624" target="_blank" class="btn btn-whatsapp">
                    Have questions? Chat on WhatsApp
                </a>
                <a href="index.html" class="btn btn-outline">
                    Return to Homepage
                </a>
            </div>
        </div>
    </main>

</body>

</html>
