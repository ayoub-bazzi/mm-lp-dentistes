    :root {
      --navy: #023047;

      --bg-page: #011d2c;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-page);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;

      text-align: center;

    .container {

      padding: 2rem;

    .icon {

      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    p {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      background: var(--blue);
      color: #fff;
      border: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn:hover {
      background: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }
  </style>
